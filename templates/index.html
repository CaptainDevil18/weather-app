<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Updated to stable Bootstrap 5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Weather App</title>
    <style>
        body {
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            min-height: 100vh;
        }

        .card {
            border-radius: 1rem;
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">🌤 WeatherApp</a>
            <form class="d-flex" role="search" method="POST" action="/">
                <input class="form-control me-2" type="search" name="city" placeholder="Search City..."
                    aria-label="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="row d-flex justify-content-center py-5">
        <div class="col-md-8 col-lg-6 col-xl-5">

            <div class="card text-body" style=" border-radius: 35px;">
                <div class="card-body p-4">

                    <div class="d-flex">
                        <h6 class="flex-grow-1">{{ weather.city }}</h6>
                    </div>

                    <div class="d-flex flex-column text-center mt-5 mb-4">
                        <h6 class="display-4 mb-0 font-weight-bold"> {{weather.temp}}°C </h6>
                        <span class="small" style="color: #868B94"> Feels like {{weather.feel_like}}°C</span>
                    </div>

                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1" style="font-size: 1rem;">
                            <div><i class="fas fa-wind fa-fw" style="color: #868B94;"></i> <span class="ms-1">Wind speed: {{weather.wind_spd}} km/h
                                </span>
                            </div>
                            <div><i class="fas fa-tint fa-fw" style="color: #868B94;"></i> <span class="ms-1">Humidity: {{weather.humidity}}%
                                </span></div>
                            <div><i class="fas fa-sun fa-fw" style="color: #868B94;"></i> <span class="ms-1">Description: {{weather.description}}
                                </span></div>
                        </div>
                        <div>
                            <img src="https://cdn.weatherbit.io/static/img/icons/{{weather.icon_code}}.png"
                                width="100px">
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
